name: Release Markway app

on:
  push:
    tags:
      - "v*"
      - "[0-9]*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.1.0"
        required: true
        default: "v0.1.0"

permissions:
  contents: write
  id-token: write
  attestations: write

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    env:
      APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      DEVELOPER_ID_APPLICATION: ${{ secrets.DEVELOPER_ID_APPLICATION }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      MARKWAY_UPDATE_FEED_URL: ${{ secrets.MARKWAY_UPDATE_FEED_URL }}
      MARKWAY_SPARKLE_PUBLIC_ED_KEY: ${{ secrets.MARKWAY_SPARKLE_PUBLIC_ED_KEY }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Apple Silicon
            arch: arm64
            runner: macos-26
    steps:
      - uses: actions/checkout@v6

      - name: Install build tools
        run: brew install xcodegen

      - name: Validate release signing secrets
        run: |
          set -euo pipefail
          missing=()
          for name in \
            APPLE_CERTIFICATE_BASE64 \
            APPLE_CERTIFICATE_PASSWORD \
            KEYCHAIN_PASSWORD \
            APPLE_TEAM_ID \
            DEVELOPER_ID_APPLICATION \
            APPLE_ID \
            APPLE_APP_SPECIFIC_PASSWORD
          do
            if [[ -z "${!name:-}" ]]; then
              missing+=("$name")
            fi
          done

          if (( ${#missing[@]} > 0 )); then
            printf 'Missing required release signing secrets:\n' >&2
            printf '  %s\n' "${missing[@]}" >&2
            printf '\nMarkway release DMGs must be Developer ID signed and notarized; unsigned GitHub downloads are blocked by Gatekeeper.\n' >&2
            exit 1
          fi

      - name: Import Developer ID certificate
        run: |
          set -euo pipefail
          keychain="$RUNNER_TEMP/markway-signing.keychain-db"
          cert="$RUNNER_TEMP/developer-id.p12"
          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > "$cert"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$keychain"
          security set-keychain-settings -lut 21600 "$keychain"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$keychain"
          security import "$cert" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$keychain"
          security list-keychain -d user -s "$keychain" login.keychain-db
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$keychain"

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build app
        env:
          ARCH: ${{ matrix.arch }}
          MARKWAY_USE_PREBUILT_JOURNAL_HELPER: "1"
        run: |
          set -euo pipefail
          build_args=(
            ARCHS="$ARCH"
            ONLY_ACTIVE_ARCH=NO
            MARKWAY_UPDATE_FEED_URL="$MARKWAY_UPDATE_FEED_URL"
            MARKWAY_SPARKLE_PUBLIC_ED_KEY="$MARKWAY_SPARKLE_PUBLIC_ED_KEY"
            CODE_SIGN_STYLE=Manual
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID"
            CODE_SIGN_IDENTITY="$DEVELOPER_ID_APPLICATION"
            CODE_SIGN_INJECT_BASE_ENTITLEMENTS=NO
            OTHER_CODE_SIGN_FLAGS="--timestamp"
          )

          xcodebuild \
            -scheme Markway \
            -configuration Release \
            -destination "generic/platform=macOS" \
            -derivedDataPath "$PWD/build/$ARCH" \
            "${build_args[@]}" \
            build

      - name: Sign release app bundle
        env:
          ARCH: ${{ matrix.arch }}
        run: |
          set -euo pipefail
          app="$PWD/build/$ARCH/Build/Products/Release/Markway.app"
          Scripts/sign_release_app.zsh \
            --app "$app" \
            --identity "$DEVELOPER_ID_APPLICATION"

      - name: Verify app signature before packaging
        env:
          ARCH: ${{ matrix.arch }}
        run: |
          set -euo pipefail
          app="$PWD/build/$ARCH/Build/Products/Release/Markway.app"
          codesign --verify --deep --strict --verbose=4 "$app"
          codesign -dv --verbose=4 "$app" 2>&1 | tee "$RUNNER_TEMP/markway-codesign.txt"
          grep -q "Authority=Developer ID Application" "$RUNNER_TEMP/markway-codesign.txt"
          if codesign -d --entitlements :- "$app" 2>/dev/null | grep -q "com.apple.security.get-task-allow"; then
            printf 'Release app has com.apple.security.get-task-allow entitlement\n' >&2
            exit 1
          fi

      - name: Create DMG
        env:
          ARCH: ${{ matrix.arch }}
        run: |
          set -euo pipefail
          app="$PWD/build/$ARCH/Build/Products/Release/Markway.app"
          dmg="$PWD/dist/Markway-${RELEASE_TAG}-${ARCH}.dmg"
          Scripts/package_dmg.zsh \
            --app "$app" \
            --out "$dmg" \
            --volume-name "Markway ${RELEASE_TAG}"

      - name: Notarize DMG
        env:
          ARCH: ${{ matrix.arch }}
        run: |
          set -euo pipefail
          dmg="$PWD/dist/Markway-${RELEASE_TAG}-${ARCH}.dmg"

          codesign --force --timestamp --sign "$DEVELOPER_ID_APPLICATION" "$dmg"
          codesign --verify --verbose=4 "$dmg"

          submit_json="$RUNNER_TEMP/markway-notary-submit.json"
          log_json="$RUNNER_TEMP/markway-notary-log.json"

          set +e
          xcrun notarytool submit "$dmg" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait \
            --timeout 2h \
            --output-format json | tee "$submit_json"
          submit_exit=${PIPESTATUS[0]}
          set -e

          submission_id="$(python3 -c 'import json, sys; print(json.load(open(sys.argv[1])).get("id", ""))' "$submit_json")"
          submission_status="$(python3 -c 'import json, sys; print(json.load(open(sys.argv[1])).get("status", ""))' "$submit_json")"

          if [[ -n "$submission_id" ]]; then
            xcrun notarytool log "$submission_id" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_APP_SPECIFIC_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" \
              "$log_json" || true
            cat "$log_json" || true
          fi

          if [[ "$submit_exit" -ne 0 || "$submission_status" != "Accepted" ]]; then
            printf 'Notarization failed with status: %s\n' "${submission_status:-unknown}" >&2
            exit 1
          fi

          xcrun stapler staple "$dmg"
          xcrun stapler validate "$dmg"
          spctl -a -vvv -t open --context context:primary-signature "$dmg"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: markway-dmg-${{ matrix.arch }}
          path: dist/*.dmg
          if-no-files-found: error

  release:
    name: Draft GitHub release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          pattern: markway-dmg-*
          path: dist
          merge-multiple: true

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/*.dmg

      - name: Create or update draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" dist/*.dmg --clobber --repo "$GITHUB_REPOSITORY"
          else
            gh release create "$RELEASE_TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$RELEASE_TAG" \
              --draft \
              dist/*.dmg
          fi
