name: Markway
options:
  bundleIdPrefix: com.anupchavan
  deploymentTarget:
    macOS: "14.0"
packages:
  Markway:
    path: .
settings:
  base:
    SWIFT_VERSION: 6.0
    ENABLE_USER_SCRIPT_SANDBOXING: "NO"
targets:
  Markway:
    type: application
    platform: macOS
    sources:
      - Apps/MarkwayMac
    dependencies:
      - package: Markway
        product: MarkwayCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.anupchavan.markway
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_KEY_CFBundleDisplayName: Markway
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.productivity
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: KVGD368RNR
        CODE_SIGN_IDENTITY: Apple Development
    postBuildScripts:
      - name: Copy Journal Helper
        script: Scripts/copy_journal_helper.zsh
        basedOnDependencyAnalysis: false
schemes:
  Markway:
    build:
      targets:
        Markway: all
    run:
      config: Debug
