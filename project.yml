name: Markway
options:
  bundleIdPrefix: com.anupchavan
  deploymentTarget:
    macOS: "14.0"
packages:
  Markway:
    path: .
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.9.0
settings:
  base:
    SWIFT_VERSION: 6.0
    ENABLE_USER_SCRIPT_SANDBOXING: "NO"
targets:
  Markway:
    type: application
    platform: macOS
    sources:
      - Apps/MarkwayMac
    dependencies:
      - package: Markway
        product: MarkwayCore
      - package: Sparkle
        product: Sparkle
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.anupchavan.markway
        GENERATE_INFOPLIST_FILE: "NO"
        INFOPLIST_FILE: Apps/MarkwayMac/Info.plist
        MARKETING_VERSION: 0.1.2
        CURRENT_PROJECT_VERSION: 3
        MARKWAY_UPDATE_FEED_URL: ""
        MARKWAY_SPARKLE_PUBLIC_ED_KEY: ""
        ENABLE_HARDENED_RUNTIME: "YES"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: KVGD368RNR
        CODE_SIGN_IDENTITY: Apple Development
    postBuildScripts:
      - name: Copy Bundle Helpers
        script: Scripts/copy_journal_helper.zsh
        basedOnDependencyAnalysis: false
schemes:
  Markway:
    build:
      targets:
        Markway: all
    run:
      config: Debug
